<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2050 训练计划</title>
  <style>
    @font-face {
      font-family: "Strength Noto CJK";
      src: url("assets/strength/fonts/NotoSansCJK-Regular.ttc") format("truetype");
      font-weight: 500;
      font-display: swap;
    }

    @font-face {
      font-family: "Strength Noto CJK";
      src: url("assets/strength/fonts/NotoSansCJK-Bold.ttc") format("truetype");
      font-weight: 700;
      font-display: swap;
    }

    @font-face {
      font-family: "Arm UI";
      src: url("assets/arm/fonts/regular.woff2") format("woff2");
      font-weight: 500;
      font-display: swap;
    }

    @font-face {
      font-family: "Arm UI";
      src: url("assets/arm/fonts/bold.woff2") format("woff2");
      font-weight: 700;
      font-display: swap;
    }

    :root {
      --bg: #fbf9ff;
      --ink: #1f1730;
      --muted: #7c728e;
      --line: #d7c5f4;
      --panel: #ffffff;
      --green: #7c3aed;
      --green-soft: #f0e8ff;
      --orange: #b993ff;
      --orange-soft: #f3ecff;
      --blue: #7c3aed;
      --blue-soft: #eee7ff;
      --red: #d13f72;
      --gray: #f3eff8;
      --shadow: 0 12px 26px rgba(86, 54, 140, .12);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 14px;
      background: #eee8f8;
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, -apple-system, sans-serif;
      letter-spacing: 0;
      overflow: hidden;
    }

    #app {
      width: min(390px, calc(100dvh * 390 / 844), 100vw);
      height: min(844px, 100dvh, calc(100vw * 844 / 390));
      background: var(--bg);
      border: 1px solid rgba(124, 58, 237, .12);
      border-radius: 28px;
      box-shadow: 0 28px 70px rgba(76, 48, 128, .2);
      overflow: hidden;
    }

    #app.home-root {
      width: min(450px, calc((100dvh - 28px) * 9 / 20.5), calc(100vw - 28px));
      height: min(1025px, calc(100dvh - 28px), calc((100vw - 28px) * 20.5 / 9));
      border: 0;
      border-radius: 0;
      background: #fff;
      box-shadow: 0 24px 64px rgba(89, 63, 138, .18);
    }

    #app.strength-root {
      width: min(450px, calc((100dvh - 28px) * 9 / 20.5), calc(100vw - 28px));
      height: min(1025px, calc(100dvh - 28px), calc((100vw - 28px) * 20.5 / 9));
      border: 0;
      border-radius: 0;
      background: #fbfaff;
      box-shadow: 0 24px 64px rgba(89, 63, 138, .18);
    }

    #app.arm-root {
      width: min(450px, calc((100dvh - 28px) * 9 / 20.5), calc(100vw - 28px));
      height: min(1025px, calc(100dvh - 28px), calc((100vw - 28px) * 20.5 / 9));
      border: 0;
      border-radius: 0;
      background: #fbfaff;
      box-shadow: 0 24px 64px rgba(89, 63, 138, .18);
    }

    #app.finger-root {
      width: min(450px, calc((100dvh - 28px) * 9 / 20.5), calc(100vw - 28px));
      height: min(1025px, calc(100dvh - 28px), calc((100vw - 28px) * 20.5 / 9));
      border: 0;
      border-radius: 0;
      background: #fbfaff;
      box-shadow: 0 24px 64px rgba(89, 63, 138, .18);
    }

    #app.pullup-root {
      width: min(450px, calc((100dvh - 28px) * 9 / 20.5), calc(100vw - 28px));
      height: min(1025px, calc(100dvh - 28px), calc((100vw - 28px) * 20.5 / 9));
      border: 0;
      border-radius: 0;
      background: #fdfaff;
      box-shadow: 0 24px 64px rgba(89, 63, 138, .18);
    }

    #app.climb-root {
      width: min(450px, calc((100dvh - 28px) * 9 / 20.5), calc(100vw - 28px));
      height: min(1025px, calc(100dvh - 28px), calc((100vw - 28px) * 20.5 / 9));
      border: 0;
      border-radius: 0;
      background: #fbfaff;
      box-shadow: 0 24px 64px rgba(89, 63, 138, .18);
    }

    .app.home-mode {
      display: block;
      background: #fff;
    }

    .home-mode .sidebar {
      display: none;
    }

    .home-mode main {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .app.strength-mode {
      display: block;
      background: #fbfaff;
    }

    .strength-mode .sidebar {
      display: none;
    }

    .strength-mode main {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .app.arm-mode {
      display: block;
      background: #fbfaff;
    }

    .arm-mode .sidebar { display: none; }

    .arm-mode main {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .app.finger-mode {
      display: block;
      background: #fbfaff;
    }

    .finger-mode .sidebar { display: none; }

    .finger-mode main {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .app.climb-mode {
      display: block;
      background: #fbfaff;
    }

    .climb-mode .sidebar { display: none; }

    .climb-mode main {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .home-screen {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      container-type: inline-size;
      background: #fff;
    }

    .home-reference {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      pointer-events: none;
      user-select: none;
    }

    .home-header-action,
    .home-visual-card,
    .home-bottom-nav button {
      position: absolute;
      min-height: 0;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: transparent;
      box-shadow: none;
      -webkit-tap-highlight-color: transparent;
    }

    .home-header-action {
      top: 2.2%;
      z-index: 3;
      width: 10.2%;
      aspect-ratio: 1;
      border-radius: 22%;
    }

    .home-header-action:hover,
    .home-visual-card:hover,
    .home-bottom-nav button:hover {
      border: 0;
    }

    .home-header-action:focus-visible,
    .home-visual-card:focus-visible,
    .home-bottom-nav button:focus-visible {
      outline: 3px solid rgba(255, 255, 255, .92);
      outline-offset: -4px;
    }

    .home-import { right: 17.4%; }
    .home-export { right: 4.8%; }

    .home-card-list {
      position: absolute;
      inset: 0;
      z-index: 2;
    }

    .home-visual-card {
      left: 2.037%;
      width: 95.556%;
      overflow: hidden;
      border-radius: 4.8% / 12%;
    }

    .home-card-strength { top: 9.634%; height: 16.179%; }
    .home-card-arm { top: 26.545%; height: 16.138%; }
    .home-card-finger { top: 43.415%; height: 16.220%; }
    .home-card-climb { top: 60.407%; height: 16.179%; }
    .home-card-pullup { top: 77.317%; height: 14.268%; }

    .home-bottom-nav {
      position: absolute;
      left: .8%;
      right: .8%;
      bottom: 0;
      height: 8.6%;
      z-index: 3;
    }

    .home-bottom-nav button {
      top: 0;
      bottom: 0;
      width: calc(100% / 6);
      height: 100%;
    }

    .home-bottom-nav button:nth-child(1) { left: 0; }
    .home-bottom-nav button:nth-child(2) { left: calc(100% / 6); }
    .home-bottom-nav button:nth-child(3) { left: calc(200% / 6); }
    .home-bottom-nav button:nth-child(4) { left: calc(300% / 6); }
    .home-bottom-nav button:nth-child(5) { left: calc(400% / 6); }
    .home-bottom-nav button:nth-child(6) { left: calc(500% / 6); }

    .strength-screen {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      container-type: inline-size;
      color: #2b2349;
      font-family: "Strength Noto CJK", "Microsoft YaHei", sans-serif;
      background: #fbfaff url("assets/strength/backgrounds/page-texture.png") center / 100% 100% no-repeat;
    }

    .strength-header-art {
      position: absolute;
      inset: 0 0 auto;
      z-index: 1;
      height: 19.976cqw;
      background: url("assets/strength/reference/strength-approved.png") top center / 100% auto no-repeat;
      pointer-events: none;
    }

    .strength-title {
      position: absolute;
      width: 1px;
      height: 1px;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
    }

    .strength-toolbar {
      position: absolute;
      inset: 0;
      z-index: 6;
      pointer-events: none;
    }

    .strength-toolbar button {
      position: absolute;
      top: 6.34cqw;
      width: 8.373cqw;
      height: 8.373cqw;
      min-height: 0;
      padding: 0;
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 1.675cqw;
      background: transparent;
      box-shadow: none;
      pointer-events: auto;
      -webkit-tap-highlight-color: transparent;
    }

    .strength-toolbar button:nth-child(1) { left: 63.038cqw; }
    .strength-toolbar button:nth-child(2) { left: 74.88cqw; }
    .strength-toolbar button:nth-child(3) { left: 86.722cqw; }

    .strength-toolbar button:focus-visible {
      outline: 2px solid #fff;
      outline-offset: 1px;
    }

    .strength-toolbar button:disabled {
      opacity: .42;
      cursor: not-allowed;
    }

    .strength-toolbar img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
      pointer-events: none;
    }

    .strength-scroll {
      position: absolute;
      inset: 0;
      z-index: 2;
      overflow-y: auto;
      overflow-x: hidden;
      padding-top: 22.727cqw;
      padding-bottom: 20cqw;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .strength-scroll::-webkit-scrollbar { display: none; }

    .strength-scrollbar {
      position: absolute;
      right: 1.794cqw;
      top: 21.65cqw;
      z-index: 9;
      width: 1.316cqw;
      height: 184.09cqw;
      border-radius: 99px;
      background: rgba(233, 228, 247, .96);
      pointer-events: none;
    }

    .strength-scrollbar-thumb {
      display: block;
      width: 100%;
      height: 104.067cqw;
      border-radius: inherit;
      background: #a593cf;
      transform: translateY(2.751cqw);
    }

    .strength-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2.99cqw;
      padding: 0 0 4.444cqw;
    }

    .strength-row {
      width: 91.268cqw;
      height: 32.895cqw;
      margin-left: 2.871cqw;
      margin-right: auto;
      border-radius: 3.349cqw;
    }

    .strength-row .swipe-actions {
      width: 31cqw;
      gap: 1.111cqw;
      padding-right: 1cqw;
    }

    .strength-row .swipe-actions button {
      min-height: 8cqw;
      padding: 0 2.4cqw;
      border-radius: 1.4cqw;
      background: rgba(255, 255, 255, .94);
      font-size: 2.6cqw;
    }

    .strength-row.open .strength-card {
      transform: translateX(-31cqw);
    }

    .item-card.strength-card {
      width: 100%;
      height: 100%;
      min-height: 0;
      padding: 0;
      display: block;
      overflow: hidden;
      border: 0;
      border-radius: 3.349cqw;
      background: transparent url("assets/strength/cards/card-empty.png") center / 100% 100% no-repeat;
      box-shadow: none;
    }

    .strength-card-decoration {
      position: absolute;
      z-index: 0;
      pointer-events: none;
      user-select: none;
    }

    .strength-card-flowers {
      left: 0;
      bottom: 0;
      width: 18.9cqw;
      height: 12.15cqw;
    }

    .strength-card-paw {
      right: -.2cqw;
      top: -1.3cqw;
      width: 11.96cqw;
      height: 11.96cqw;
      opacity: .62;
    }

    .strength-card-summary,
    .strength-weight,
    .strength-stage-grid {
      position: absolute;
      z-index: 2;
    }

    .strength-card-summary {
      left: 3.82cqw;
      top: 3.828cqw;
      min-height: 5.981cqw;
      display: flex;
      align-items: center;
      white-space: nowrap;
    }

    .strength-card-name {
      color: #2b2349;
      font-size: 4.8cqw;
      font-weight: 700;
      line-height: 5.502cqw;
    }

    .strength-card-count {
      margin-left: 2.8cqw;
      color: #7b7196;
      font-size: 3.4cqw;
      font-weight: 500;
      line-height: 3.589cqw;
      position: relative;
      top: .3cqw;
    }

    button.strength-count-add {
      position: static;
      z-index: auto;
      margin-left: 2.15cqw;
      width: 5.981cqw;
      height: 5.981cqw;
      flex: 0 0 auto;
      min-height: 0;
      padding: 0;
      display: grid;
      place-items: center;
      border: 1px solid #d8c7f5;
      border-radius: 1.675cqw;
      background: rgba(255, 255, 255, .78);
      color: #2b2349;
      font-size: 5.2cqw;
      font-weight: 500;
      line-height: 1;
      transform: translateY(.5cqw);
    }

    button.strength-count-add:hover { border-color: #a98ae6; }

    .strength-weight {
      left: 73.291cqw;
      top: 3.589cqw;
      width: 13.397cqw;
      height: 7.297cqw;
      display: grid;
      place-items: center;
      background: url("assets/strength/cards/weight-pill.png") center / 100% 100% no-repeat;
      color: #7650dd;
      filter: saturate(1.15) brightness(.98);
      font-size: 2.99cqw;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
    }

    .strength-stage-grid {
      left: 3.42cqw;
      top: 13.995cqw;
      display: grid;
      grid-template-columns: repeat(5, 15.67cqw);
      gap: 1.914cqw;
    }

    .strength-card .stage {
      width: 15.67cqw;
      height: 15.55cqw;
      min-height: 0;
      padding: 0;
      display: grid;
      place-content: center;
      gap: 1.2cqw;
      border: 0;
      border-radius: 2.153cqw;
      background-color: transparent;
      background-position: center;
      background-size: 100% 100%;
      background-repeat: no-repeat;
      color: #2b2349;
      box-shadow: none;
    }

    .strength-card .stage.none {
      background-image: url("assets/strength/cards/stage-pending.png");
    }

    .strength-card .stage.doing {
      border: 1px solid rgba(188, 167, 231, .45);
      background-color: #e9e0f0;
      background-image: url("assets/strength/backgrounds/page-texture.png");
      background-position: center 42%;
      background-size: 190cqw auto;
      background-blend-mode: soft-light;
      color: #5d4b88;
    }

    .strength-card .stage.done {
      background-color: #9e89e0;
      background-image: url("assets/strength/reference/strength-approved.png");
      background-position: -81cqw -2cqw;
      background-size: 165cqw auto;
      color: #fff;
      box-shadow: inset 0 0 2.2cqw rgba(89, 61, 155, .08);
    }

    .strength-card .stage strong {
      font-size: 3.828cqw;
      font-weight: 700;
      line-height: 4.187cqw;
    }

    .strength-card .stage small {
      color: #7b7196;
      font-size: 3.3cqw;
      font-weight: 500;
      line-height: 3.589cqw;
      position: relative;
      top: 1cqw;
    }

    .strength-card .stage.done small { color: #fff; }

    .strength-nav {
      position: absolute;
      inset: auto 0 0;
      z-index: 12;
      height: 17.943cqw;
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      background: url("assets/strength/reference/strength-approved.png") bottom center / 100% auto no-repeat;
    }

    .strength-nav button {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 0;
      padding: 0;
      display: grid;
      grid-template-rows: 1fr auto;
      place-items: center;
      gap: 0;
      overflow: visible;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: transparent;
      box-shadow: none;
      font-size: 1.481cqw;
      font-weight: 500;
      line-height: 1.667cqw;
      -webkit-tap-highlight-color: transparent;
    }

    .strength-nav button::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 1.667cqw;
      z-index: -1;
      width: 10.926cqw;
      height: 10.37cqw;
      transform: translateX(-50%);
      opacity: 0;
      background: transparent;
    }

    .strength-nav button.active { color: transparent; }

    .strength-nav button.active::before { opacity: 1; }

    .strength-nav img {
      position: relative;
      z-index: 1;
      width: 4.444cqw;
      height: 4.444cqw;
      align-self: end;
      object-fit: contain;
      opacity: 0;
    }

    .strength-nav span {
      position: relative;
      z-index: 1;
      padding-bottom: 1.111cqw;
      opacity: 0;
    }

    .arm-screen {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      container-type: inline-size;
      color: #312858;
      font-family: "Arm UI", "Microsoft YaHei", "PingFang SC", sans-serif;

    }

      background: url("assets/arm/reference/arm-approved.png") top center / 100% auto no-repeat;
      pointer-events: none;
    }

      position: absolute;

    }

      height: 8.8cqw;
      min-height: 0;
      padding: 0;
      border: 0;
      border-radius: 2cqw;
      background: transparent;
      box-shadow: none;

    }

    .arm-toolbar button:nth-child(2) { left: 66cqw; }
    .arm-toolbar button:nth-child(3) { left: 76.4cqw; }
    .arm-toolbar button:nth-child(4) { left: 86.7cqw; }

    .arm-toolbar button:disabled {
      opacity: .38;

    }

    .arm-scroll {
      position: absolute;
      inset: 0;
      z-index: 2;
      overflow-y: auto;
      overflow-x: hidden;
      padding-top: 25.05cqw;
      padding-bottom: 22.5cqw;
      scrollbar-width: none;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }

    .arm-scroll::-webkit-scrollbar { display: none; }

    .arm-tree {
      display: grid;
      gap: 2.7cqw;
      padding-bottom: 4cqw;
    }

    .arm-category {

      display: grid;
      gap: 0;
    }

    .arm-category-summary {
      position: relative;
      z-index: 2;
      width: 89.57cqw;
      height: 11.37cqw;
      min-height: 0;
      margin-left: 3.28cqw;
      padding: 0 4.45cqw 0 3.3cqw;
      display: flex;
      align-items: center;
      justify-content: space-between;

      border-radius: 3.5cqw;

      position: absolute;
      left: 7.03cqw;

      bottom: 0;
      width: .32cqw;

<body>
  <div id="app"></div>
  <dialog id="modal"></dialog>
  <div id="toast" class="toast"></div>
  <input id="data-import-file" type="file" accept="application/json,.json" hidden onchange="importDataFile(this)">

  <script>
    const STORAGE_KEY = "fitness-2050-state-v1";
    const BASE_DATA_VERSION = "2026-06-18-sheet-v1";
    const todayISO = () => new Date().toISOString().slice(0, 10);
    const uid = () => Math.random().toString(36).slice(2, 10);
    const fmtWeight = value => `${Number(value || 0).toFixed(1).replace(".0", "")}kg`;
    const stages = [
      { key: "reserve", label: "储备", value: "5*4" },
      { key: "level", label: "L值", value: "5*5" },
      { key: "adv2", label: "进阶2", value: "6*5" },
      { key: "adv3", label: "进阶3", value: "7*5" },
      { key: "adv4", label: "进阶4", value: "6*6" }
    ];
    const modules = [
      { id: "home", title: "主页", icon: "⌂" },
      { id: "strength", title: "增力计划", icon: "力" },
      { id: "arm", title: "腕力计划", icon: "腕" },
      { id: "finger", title: "指力计划", icon: "指" },
      { id: "climb", title: "攀岩打卡", icon: "岩" },
      { id: "pullup", title: "引体打卡", icon: "引" }
    ];
    const strengthSheetSeed = [
      {
        id: "seed-卧推",
        name: "卧推",
        count: 3,
        weight: 90,
        increment: 5,
        stages: { reserve: "done", level: "done", adv2: "none", adv3: "none", adv4: "none" },
        history: [85],
        sourceRow: 4
      },
      {
        id: "seed-引体",
        name: "引体",
        count: 1,
        weight: 20,
        increment: 5,
        stages: { reserve: "done", level: "done", adv2: "done", adv3: "done", adv4: "doing" },
        history: [],
        sourceRow: 9
      },
      {
        id: "seed-深蹲",
        name: "深蹲",
        count: 2,
        weight: 55,
        increment: 5,
        stages: { reserve: "doing", level: "none", adv2: "none", adv3: "none", adv4: "none" },
        history: [50],
        sourceRow: 16
      },
      {
        id: "seed-硬拉",
        name: "硬拉",
        count: 0,
        weight: 90,
        increment: 5,
        stages: { reserve: "none", level: "none", adv2: "none", adv3: "none", adv4: "none" },
        history: [],
        sourceRow: 21
      },
      {
        id: "seed-实力推",
        name: "实力推",
        count: 3,
        weight: 45,
        increment: 5,
        stages: { reserve: "done", level: "doing", adv2: "none", adv3: "none", adv4: "none" },
        history: [40],
        sourceRow: 28
      },
      {
        id: "seed-杠铃弯举",
        name: "杠铃弯举",
        count: 1,
        weight: 55,
        increment: 5,
        stages: { reserve: "doing", level: "none", adv2: "none", adv3: "none", adv4: "none" },
        history: [50],
        sourceRow: 34
      }
    ];

    const defaultPlanTree = type => {
      if (type === "arm") {
        return [
          { id: uid(), name: "提腕力", items: [] },
          { id: uid(), name: "提力", items: [] },
          { id: uid(), name: "旋前力", items: [] },
          { id: uid(), name: "拇指力", items: [] },
          { id: uid(), name: "屈腕力", items: [] },
          { id: uid(), name: "指力", items: [] },
          { id: uid(), name: "二头力", items: [] },
          { id: uid(), name: "横向力", items: [] },
          { id: uid(), name: "勾手力", items: [] },
          { id: uid(), name: "旋后力", items: [] }
        ];
      }
      return [
        { id: uid(), name: "深浅板", items: [] },
        { id: uid(), name: "洞板", items: [] },
        { id: uid(), name: "捏捏", items: [] }
      ];
    };

    const defaultState = () => ({
      active: "home",
      strength: [],
      arm: { focusOnly: false, tree: defaultPlanTree("arm") },
      finger: { focusOnly: false, tree: defaultPlanTree("finger") },
      pullup: { startDate: "2026-05-14", calendarMonth: "2026-05", entries: [] },
      expanded: {},
      meta: { baseDataVersion: "" }
    });

    let state = loadState();
    let undoStack = [];

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : defaultState();
      } catch {
        return defaultState();
      }
    }

    function isEmptyBaseState(sourceState = state) {
      const planCount = type => sourceState[type]?.tree?.reduce((sum, cat) => sum + (cat.items?.length || 0), 0) || 0;
      return (sourceState.strength?.length || 0) === 0
        && planCount("arm") === 0
        && planCount("finger") === 0
        && (sourceState.pullup?.entries?.length || 0) === 0;
    }

    function strengthBaseData() {
      return strengthSheetSeed.map(item => ({
        ...item,
        stages: { ...item.stages },
        history: [...item.history],
        importedAt: todayISO()
      }));
    }

    async function readSeed(file) {
      const response = await fetch(file, { cache: "no-store" });
      if (!response.ok) throw new Error(file);
      return response.json();
    }

    async function initializeBaseData() {
      if (state.meta?.baseDataVersion === BASE_DATA_VERSION || !isEmptyBaseState()) return;
      try {
        const [armTree, fingerTree, pullupPayload] = await Promise.all([
          readSeed("arm-seed.json"),
          readSeed("finger-seed.json"),
          readSeed("pullup-seed.json")
        ]);
        state.strength = strengthBaseData();
        state.arm = { focusOnly: false, tree: armTree };
        state.finger = { focusOnly: false, tree: fingerTree };
        state.pullup = {
          startDate: pullupPayload.startDate || "2026-05-14",
          calendarMonth: (pullupPayload.startDate || "2026-05-14").slice(0, 7),
          entries: pullupPayload.entries || []
        };
        state.expanded = {};
        state.meta = { ...(state.meta || {}), baseDataVersion: BASE_DATA_VERSION };
        normalizePlanTree(state.arm);
        normalizePlanTree(state.finger);
        collapsePlan("arm");
        collapsePlan("finger");
        saveState();
        render();
      } catch {
        toast("基础数据读取失败");
      }
    }

    function normalizePlanTree(plan) {
      if (!plan?.tree) return;
      if (plan.tree.some(node => Array.isArray(node.children))) {
        plan.tree = plan.tree.flatMap(top => Array.isArray(top.children) ? top.children : [top]);
      }
      plan.tree.forEach(node => {
        node.items = node.items || [];
        delete node.children;
      });
    }

    function collapsePlan(type, sourceState = state) {
      sourceState[type].tree.forEach(cat => {
        sourceState.expanded[cat.id] = false;
      });
    }

    normalizePlanTree(state.arm);
    normalizePlanTree(state.finger);
    collapsePlan("arm");
    collapsePlan("finger");
    saveState();

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function setState(mutator, options = {}) {
      if (!options.skipUndo) {
        undoStack.push(JSON.stringify(state));
        if (undoStack.length > 30) undoStack.shift();
      }
      mutator(state);
      saveState();
      render();
    }

    function undoLast() {
      const snapshot = undoStack.pop();
      if (!snapshot) return;
      state = JSON.parse(snapshot);
      saveState();
      render();
      toast("已撤回");
    }

    let swipeState = null;

    function closeSwipeRows(except) {
      document.querySelectorAll(".swipe-row.open").forEach(row => {
        if (row !== except) row.classList.remove("open");
      });
    }

    function bindSwipeRows() {
      document.querySelectorAll(".swipe-row").forEach(row => {
        const card = row.querySelector(".item-card");
        row.addEventListener("pointerdown", event => {
          if (event.target.closest("button")) return;
          closeSwipeRows(row);
          swipeState = {
            row,
            card,
            startX: event.clientX,
            startY: event.clientY,
            base: row.classList.contains("open") ? -158 : 0,
            dragging: false,
            locked: null
          };
          row.setPointerCapture?.(event.pointerId);
        });
        row.addEventListener("pointermove", event => {
          if (!swipeState || swipeState.row !== row) return;
          const dx = event.clientX - swipeState.startX;
          const dy = event.clientY - swipeState.startY;
          const absX = Math.abs(dx);
          const absY = Math.abs(dy);
          if (!swipeState.locked) {
            if (absY > 10 && absY > absX * 1.2) {
              swipeState.locked = "scroll";
              return;
            }
            if (absX < 22 || absX < absY * 1.6) return;
            swipeState.locked = "swipe";
          }
          if (swipeState.locked !== "swipe") return;
          swipeState.dragging = true;
          event.preventDefault();
          row.classList.add("dragging");
          const x = Math.max(-158, Math.min(0, swipeState.base + dx));
          card.style.transform = `translateX(${x}px)`;
        });
        row.addEventListener("pointerup", event => finishSwipe(row, event));
        row.addEventListener("pointercancel", event => finishSwipe(row, event));
      });
    }

    function bindStrengthScrollIndicator() {
      const scroller = document.querySelector(".strength-scroll");
      const track = document.querySelector(".strength-scrollbar");
      const thumb = document.querySelector(".strength-scrollbar-thumb");
      if (!scroller || !track || !thumb) return;
      const update = () => {
        const maxScroll = Math.max(0, scroller.scrollHeight - scroller.clientHeight);
        const travel = Math.max(0, track.clientHeight - thumb.clientHeight);
        const baseRatio = 23 / (1539 - 870);
        const ratio = maxScroll
          ? baseRatio + (1 - baseRatio) * (scroller.scrollTop / maxScroll)
          : baseRatio;
        thumb.style.transform = `translateY(${travel * ratio}px)`;
      };
      scroller.addEventListener("scroll", update, { passive: true });
      update();
    }

    function bindArmScrollIndicator() {
      const scroller = document.querySelector(".arm-scroll");
      const track = document.querySelector(".arm-scrollbar");
      const thumb = document.querySelector(".arm-scrollbar-thumb");
      if (!scroller || !track || !thumb) return;
      const update = () => {
        const maxScroll = Math.max(0, scroller.scrollHeight - scroller.clientHeight);
        const trackTop = track.clientWidth * 2;
        const available = Math.max(0, track.clientHeight - trackTop);
        const visibleRatio = Math.min(1, scroller.clientHeight / Math.max(scroller.scrollHeight, 1));
        const thumbHeight = Math.max(track.clientWidth * 8, available * visibleRatio);
        const travel = Math.max(0, available - thumbHeight);
        const ratio = maxScroll ? scroller.scrollTop / maxScroll : 0;
        thumb.style.height = `${thumbHeight}px`;
        thumb.style.transform = `translate(-50%, ${travel * ratio}px)`;
      };
      scroller.addEventListener("scroll", update, { passive: true });
      update();
    }

    function finishSwipe(row, event) {
      if (!swipeState || swipeState.row !== row) return;
      const dx = event.clientX - swipeState.startX;
      const x = Math.max(-158, Math.min(0, swipeState.base + dx));
      row.classList.remove("dragging");
      swipeState.card.style.transform = "";
      if (swipeState.locked === "swipe" && swipeState.dragging) {
        row.classList.toggle("open", x < -82);
      }
      swipeState = null;
    }

    function toast(text) {
      const el = document.getElementById("toast");
      el.textContent = text;
      el.classList.add("show");
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => el.classList.remove("show"), 1600);
    }

    function esc(text) {
      return String(text ?? "").replace(/[&<>"']/g, m => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[m]));
    }

    function openModal(title, body, onSubmit) {
      const dialog = document.getElementById("modal");
      dialog.innerHTML = `
        <form method="dialog" class="modal-body">
          <div class="modal-head">
            <h3>${esc(title)}</h3>
            <button class="icon ghost" value="cancel" formnovalidate title="关闭">×</button>
          </div>

          <div class="row-actions modal-actions">
            <button value="cancel" formnovalidate>取消</button>
            <button class="primary" value="ok">保存</button>
          </div>
        </form>`;
      dialog.onclose = () => {
        if (dialog.returnValue !== "ok") return;
        const data = Object.fromEntries(new FormData(dialog.querySelector("form")).entries());
        onSubmit(data);
      };
      dialog.showModal();
    }

    function exportData() {
      const payload = {
        app: "fitness-2050",
        version: BASE_DATA_VERSION,
        exportedAt: new Date().toISOString(),
        data: state
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `fitness-2050-${todayISO()}.json`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      toast("已导出数据");
    }

    function chooseDataImport() {
      const input = document.getElementById("data-import-file");
      input.value = "";
      input.click();
    }

    function importDataFile(input) {
      const file = input.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const payload = JSON.parse(reader.result);
          const next = payload?.data || payload;
          if (!isValidImportedState(next)) throw new Error("invalid");
          undoStack.push(JSON.stringify(state));
          if (undoStack.length > 30) undoStack.shift();
          state = next;
          state.active = "home";
          state.meta = { ...(state.meta || {}), importedAt: new Date().toISOString() };
          normalizePlanTree(state.arm);
          normalizePlanTree(state.finger);
          state.expanded = state.expanded || {};
          collapsePlan("arm");
          collapsePlan("finger");
          saveState();
          render();
          toast("已导入数据");
        } catch {
          toast("导入失败，文件不正确");
        }
      };
      reader.readAsText(file);
    }

    function isValidImportedState(next) {
      return !!next
        && Array.isArray(next.strength)
        && Array.isArray(next.arm?.tree)
        && Array.isArray(next.finger?.tree)
        && Array.isArray(next.pullup?.entries);
    }

    function importStrengthSheet() {
      const preview = strengthSheetSeed.map(item => {
        const active = stages.filter(stage => item.stages[stage.key] !== "none")

      }).join("");
      openModal("导入增力表格", `
        <div class="meta">将覆盖当前增力项目，导入表格中已有颜色进度的当前重量。</div>
        <div class="history">${preview}</div>`, () => {
          setState(s => {

              ...item,

    function cycleStrengthStage(id, key) {
      setState(s => {
        const item = s.strength.find(x => x.id === id);
        const next = { none: "doing", doing: "done", done: "none" };
        item.stages[key] = next[item.stages[key] || "none"];
        if (stages.every(st => item.stages[st.key] === "done")) {
          item.history.unshift(item.weight);
          item.weight = Number(item.weight) + Number(item.increment);
          item.stages = Object.fromEntries(stages.map(x => [x.key, "none"]));
          toast(`${item.name} 升级到 ${fmtWeight(item.weight)}`);
        }
      });
    }

          <div class="arm-card-head">
            <span class="arm-item-name">${esc(item.name)}</span>
            <span class="arm-item-meta">LV${Number(item.level || 1)} · 第 ${Number(item.count || 0)} 次</span>
            <button class="arm-count-add" title="训练次数加一" onclick="incPlanCount('${type}','${catId}','${item.id}')">＋</button>
          </div>
          <button class="arm-favorite" title="重点" onclick="toggleItemFocus('${type}','${catId}','${item.id}')">
            <img src="assets/arm/icons/star-${item.focus ? "active" : "normal"}.png" alt="">
          </button>
          <div class="arm-card-main">
            <div class="arm-metrics">${sides.map(side => renderArmMetric(item, side)).join("")}</div>
            <div class="arm-side-actions">
              <button title="升级" onclick="upgradePlanItem('${type}','${catId}','${item.id}')">升</button>
              <button title="极限" onclick="editMax('${type}','${catId}','${item.id}')">极</button>
            </div>
          </div>
        </article>
      </div>`;
    }

    function renderArmMetric(item, side) {
      const maxRecord = maxRecordBySide(item, side);
      return `<div class="arm-metric-row">
        <span class="arm-side-badge">${esc(side)}</span>
        <span class="arm-weight-pill">组 ${fmtWeight(item.sideWeights[side])}</span>
        <span class="arm-max-pill">极 ${maxRecord ? fmtWeight(maxRecord.weight) : "未填"}</span>
      </div>`;
    }

    async function importPlanSheet(type) {
      let tree = [];
      const file = type === "arm" ? "arm-seed.json" : "finger-seed.json";
      const label = type === "arm" ? "腕力" : "指力";
      try {
        const response = await fetch(file, { cache: "no-store" });
        tree = await response.json();
      } catch {
        toast(`${label}表格数据读取失败`);
        return;
      }
      const total = tree.reduce((sum, cat) => sum + cat.items.length, 0);
      openModal(`导入${label}表格`, `
        <div class="meta">将覆盖当前${label}计划，导入 ${tree.length} 个分类、${total} 个条目。</div>
        <div class="history">${tree.slice(0, 8).map(cat => `<span class="pill blue">${esc(cat.name)} · ${cat.items.length}</span>`).join("")}</div>`, () => {
          setState(s => {
            s[type].tree = tree;
            s[type].focusOnly = false;
            collapsePlan(type, s);
          });
          toast(`已导入${label}计划表格数据`);
      });
    }

    function renderCategory(type, cat) {
      const open = type === "arm" || type === "finger" ? state.expanded[cat.id] === true : state.expanded[cat.id] !== false;
      const items = state[type].focusOnly ? cat.items.filter(x => x.focus) : cat.items;
      return `<div class="tree-row">
        <button class="tree-summary" onclick="toggleExpand('${cat.id}')">
          <span>${esc(cat.name)} <span class="meta">${items.length}</span></span><span>${open ? "⌃" : "⌄"}</span>
        </button>
        ${open ? `<div class="tree-children">
          <div class="detail-list">${items.length ? items.map(item => renderPlanItem(type, cat.id, item)).join("") : `<div class="empty">暂无条目</div>`}</div>
          <div class="row-actions"><button onclick="newPlanItem('${type}','${cat.id}')">＋ 条目</button></div>
        </div>` : ""}
      </div>`;
    }

    function itemSides(item) {
      return (item.sides?.length ? item.sides : ["单项"]).filter(Boolean);
    }

    function ensureSideData(item) {
      const sides = itemSides(item);
      item.sideWeights = item.sideWeights || {};
      sides.forEach(side => {
        if (item.sideWeights[side] === undefined) item.sideWeights[side] = Number(item.weight || 0);
      });
      item.weight = Math.max(...sides.map(side => Number(item.sideWeights[side] || 0)));
      return sides;
    }

    function maxRecordBySide(item, side) {
      return (item.maxRecords || []).filter(record => (record.side || "单项") === side)
        .sort((a, b) => Number(b.weight || 0) - Number(a.weight || 0))[0];
    }

    function renderSideMetrics(item) {
      const sides = ensureSideData(item);
      return `<div class="side-metrics">${sides.map(side => {
        const maxRecord = maxRecordBySide(item, side);
        return `<div class="side-row">
          <span class="side-badge">${esc(side)}</span>
          <span class="pill green">组 ${fmtWeight(item.sideWeights[side])}</span>
          <span class="pill blue">极 ${maxRecord ? fmtWeight(maxRecord.weight) : "未填"}</span>
        </div>`;
      }).join("")}</div>`;
    }

    function renderMaxHistory(item) {
      const records = item.maxRecords || [];
      if (!records.length) return "";
      return `<div class="history">极限记录：${records.slice(0, 6).map(r => `${esc(r.side || "单项")} ${r.date} ${fmtWeight(r.weight)}`).join(" / ")}</div>`;
    }

    function sideOptions(item, includeAll = false) {
      const sides = itemSides(item);
      return `${includeAll && sides.length > 1 ? `<option value="全部">全部</option>` : ""}${sides.map(side => `<option value="${esc(side)}">${esc(side)}</option>`).join("")}`;
    }

    function renderPlanItem(type, catId, item) {
      ensureSideData(item);
      return `<div class="swipe-row" data-swipe-id="${item.id}" data-swipe-type="${type}">
      <div class="swipe-actions">
        <button onclick="editPlanItem('${type}','${catId}','${item.id}')">编辑</button>
        <button class="danger" onclick="deletePlanItem('${type}','${catId}','${item.id}')">删除</button>
      </div>
      <article class="item-card ${item.focus ? "focus" : ""}">
        <div class="item-head">
          <div>
            <div class="title-line">
              <span class="item-name">${esc(item.name)}</span>
              <span class="meta">LV${item.level} · 第 ${item.count} 次<button class="inline-plus" title="训练次数加一" onclick="incPlanCount('${type}','${catId}','${item.id}')">＋</button></span>
            </div>
          </div>
          <button class="icon ${item.focus ? "primary" : ""}" title="重点" onclick="toggleItemFocus('${type}','${catId}','${item.id}')">★</button>
        </div>
        <div class="plan-body">
          <div>
            ${renderSideMetrics(item)}
          </div>
          <div class="side-actions">
            <button title="升级" onclick="upgradePlanItem('${type}','${catId}','${item.id}')">升</button>
            <button title="极限" onclick="editMax('${type}','${catId}','${item.id}')">极</button>
          </div>
        </div>
      </article>
      </div>`;
    }

    function findPlanItem(type, catId, itemId) {
      const cat = state[type].tree.find(x => x.id === catId);
      return { cat, item: cat.items.find(x => x.id === itemId) };
    }

    function toggleExpand(id) {
      setState(s => { s.expanded[id] = s.expanded[id] === false; });
    }

    function toggleFocus(type) {
      setState(s => { s[type].focusOnly = !s[type].focusOnly; });
    }

    function newTop(type) {
      openModal("新建分类", `<label>名称<input name="name" required></label>`, data => {
        setState(s => s[type].tree.push({ id: uid(), name: data.name.trim(), items: [] }));
      });
    }

    function newPlanItem(type, catId) {
      openModal("新建条目", `
        <div class="form-grid" style="grid-template-columns:1fr 1fr">
          <label>名称<input name="name" required></label>
          <label>类型<select name="sides" onchange="toggleNewItemWeightFields(this)"><option value="左右">左右</option><option value="单项">单项</option></select></label>
          <label data-pair-weights>右手重量${weightInput("weight_右", 5)}</label>
          <label data-pair-weights>左手重量${weightInput("weight_左", 5)}</label>
          <label data-single-weight style="display:none">起始重量${weightInput("weight_单项", 5)}</label>
          <label>极限重量${weightInput("maxWeight", "")}</label>
        </div>`, data => {
          setState(s => {
            const cat = s[type].tree.find(x => x.id === catId);
            const sides = data.sides === "左右" ? ["右", "左"] : ["单项"];
            const sideWeights = Object.fromEntries(sides.map(side => [side, Number(data[`weight_${side}`] || 0)]));
            const maxRecords = data.maxWeight ? sides.map(side => ({ date: todayISO(), weight: Number(data.maxWeight), side })) : [];
            cat.items.push({
              id: uid(),
              name: data.name.trim(),
              sides,
              sideWeights,
              weight: Number(data.weight || 0),
              level: 1,
              count: 0,
              focus: false,
              history: [],
              maxRecords
            });
          });
      });
    }

    function toggleItemFocus(type, catId, itemId) {
      setState(s => { findPlanItem(type, catId, itemId).item.focus = !findPlanItem(type, catId, itemId).item.focus; });
    }

    function incPlanCount(type, catId, itemId) {
      setState(s => { findPlanItem(type, catId, itemId).item.count += 1; });
    }

    function upgradePlanItem(type, catId, itemId) {
      const { item } = findPlanItem(type, catId, itemId);
      ensureSideData(item);
      openModal("升级重量", `
        <div class="form-grid" style="grid-template-columns:1fr 1fr">
            <label>手别<select name="side">${sideOptions(item, true)}</select></label>
            <label>增加重量${weightInput("add", 2.5)}</label>
        </div>`, data => {
          setState(s => {
            const target = findPlanItem(type, catId, itemId).item;
            const sides = ensureSideData(target);
            const selected = data.side === "全部" ? sides : [data.side || sides[0]];
            selected.forEach(side => {
              target.history.unshift({ side, weight: target.sideWeights[side] });
              target.sideWeights[side] = Number(target.sideWeights[side] || 0) + Number(data.add || 2.5);
            });
            target.weight = Math.max(...sides.map(side => Number(target.sideWeights[side] || 0)));
            target.level += 1;
          });
      });
    }

    function editMax(type, catId, itemId) {
      const { item } = findPlanItem(type, catId, itemId);
      ensureSideData(item);
      openModal("更新极限重量", `
        <div class="form-grid" style="grid-template-columns:1fr 1fr">
          <label>手别<select name="side">${sideOptions(item)}</select></label>
          <label>日期<input name="date" type="date" value="${todayISO()}"></label>
          <label>极限重量${weightInput("weight", "")}</label>
        </div>`, data => {
          setState(s => {
            const target = findPlanItem(type, catId, itemId).item;
            target.maxRecords = target.maxRecords || [];
            target.maxRecords.unshift({ date: data.date || todayISO(), weight: Number(data.weight || 0), side: data.side || itemSides(target)[0] });
          });
      });
    }

    function editPlanItem(type, catId, itemId) {
      const { item } = findPlanItem(type, catId, itemId);
      ensureSideData(item);
      const sideInputs = itemSides(item).map(side => `<label>${esc(side)}当前重量${weightInput(`weight_${side}`, item.sideWeights[side])}</label>`).join("");
      openModal("编辑条目", `
        <div class="form-grid" style="grid-template-columns:1fr 1fr">
          <label>名称<input name="name" required value="${esc(item.name)}"></label>
          <label>训练次数<input name="count" type="number" min="0" step="1" value="${item.count}"></label>
          <label>等级<input name="level" type="number" min="1" step="1" value="${item.level}"></label>
          ${sideInputs}
        </div>`, data => {
          setState(s => {
            const target = findPlanItem(type, catId, itemId).item;
            const sides = ensureSideData(target);
            target.name = data.name.trim();
            target.count = Number(data.count || 0);
            target.level = Number(data.level || 1);
            sides.forEach(side => {
              target.sideWeights[side] = Number(data[`weight_${side}`] || 0);
            });
            target.weight = Math.max(...sides.map(side => Number(target.sideWeights[side] || 0)));
          });
      });
    }

    function deletePlanItem(type, catId, itemId) {
      setState(s => {
        const cat = s[type].tree.find(x => x.id === catId);
        cat.items = cat.items.filter(x => x.id !== itemId);
      });
    }

    function renderClimb() {
      return `<section class="climb-screen" aria-label="攀岩打卡">
        <div class="climb-content">
          <header class="climb-header-art">
            <h2 class="climb-header-title">攀岩打卡</h2>
            <p class="climb-header-subtitle">入口保留</p>
          </header>
          <section class="band"><div class="empty">待复刻</div></section>
        </div>
        <nav class="climb-bottom-nav asset-bottom-nav asset-bottom-nav-climb" aria-label="攀岩打卡导航">
          ${modules.map(module => `<button class="${module.id === "climb" ? "active" : ""}" onclick="go('${module.id}')"><span class="sr-only">${esc(module.title)}</span></button>`).join("")}
        </nav>
      </section>`;
    }

    function renderPullup() {
      const entries = [...state.pullup.entries].sort((a, b) => b.date.localeCompare(a.date));
      const total = state.pullup.entries.reduce((sum, e) => sum + entryTotal(e), 0);
      const missed = countMissed();
      state.pullup.calendarMonth = state.pullup.calendarMonth || todayISO().slice(0, 7);
      const [year, month] = state.pullup.calendarMonth.split("-").map(Number);
      const rows = Math.ceil((new Date(year, month - 1, 1).getDay() + new Date(year, month, 0).getDate()) / 7);
      const latest = entries.slice(0, 2);
      const referenceMode = state.pullup.calendarMonth === "2026-06"
        && total === 921
        && state.pullup.entries.length === 10
        && latest[0]?.date === "2026-06-18"
        && entryTotal(latest[0]) === 10
        && latest[1]?.date === "2026-06-17"
        && entryTotal(latest[1]) === 10;
      return `<section class="pullup-screen${referenceMode ? " reference-mode" : ""}" aria-label="引体打卡">
        <header class="pullup-header-art">
          <div class="pullup-header-copy">
            <h2>引体打卡</h2>
            <div class="pullup-header-total">${total}</div>
            <div class="pullup-header-meta"><span>打卡 ${state.pullup.entries.length} 天</span><span>缺席 ${missed} 天</span></div>
          </div>
          <div class="pullup-header-actions" aria-label="引体打卡操作">
            <button class="pullup-header-action pullup-import-action" onclick="importPullupSheet()" title="导入表格">⇩<span class="sr-only">导入表格</span></button>
            <button class="pullup-header-action pullup-settings-action" onclick="editPullupStart()" title="设置起始日">⚙<span class="sr-only">设置起始日</span></button>
            <button class="pullup-header-action pullup-undo-action" onclick="undoLast()" ${undoStack.length ? "" : "disabled"} title="撤回">↶<span class="sr-only">撤回</span></button>
          </div>
        </header>
        <div class="pullup-content${referenceMode ? " reference-mode" : ""}">
          <section class="pullup-calendar-panel rows-${rows}" aria-label="${formatMonth(state.pullup.calendarMonth)}日历">
            <div class="pullup-calendar-head">
              <button class="pullup-month-button pullup-month-prev" onclick="shiftPullupMonth(-1)" title="上个月">‹</button>
              <strong class="pullup-calendar-title">${formatMonth(state.pullup.calendarMonth)}</strong>
              <button class="pullup-month-button pullup-month-next" onclick="shiftPullupMonth(1)" title="下个月">›</button>
            </div>
            <div class="pullup-calendar-grid">${renderCalendar()}</div>
          </section>
          <section class="pullup-records" aria-label="打卡记录">
            ${entries.length ? entries.map(renderPullupEntry).join("") : `<div class="pullup-empty-records">暂无打卡</div>`}
          </section>
        </div>
        <button class="pullup-checkin-button" onclick="newPullupEntry()"><span class="sr-only">打卡</span></button>
        <nav class="pullup-bottom-nav asset-bottom-nav asset-bottom-nav-pullup" aria-label="引体打卡导航">
          ${modules.map(module => `<button class="${module.id === "pullup" ? "active" : ""}" onclick="go('${module.id}')"><span class="sr-only">${esc(module.title)}</span></button>`).join("")}
        </nav>
      </section>`;
    }

    function formatMonth(month) {
      const [year, value] = month.split("-");
      return `${year}年${Number(value)}月`;
    }

    function shiftPullupMonth(delta) {
      setState(s => {
        const [year, month] = (s.pullup.calendarMonth || todayISO().slice(0, 7)).split("-").map(Number);
        const date = new Date(year, month - 1 + delta, 1);
        s.pullup.calendarMonth = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`;
      });
    }

    async function importPullupSheet() {
      let payload = null;
      try {
        const response = await fetch("pullup-seed.json", { cache: "no-store" });
        payload = await response.json();
      } catch {
        toast("引体表格数据读取失败");
        return;
      }
      const total = payload.entries.reduce((sum, entry) => sum + entry.groups.reduce((a, n) => a + Number(n || 0), 0), 0);
      openModal("导入引体表格", `
        <div class="meta">将覆盖当前引体记录，导入 ${payload.entries.length} 天、总计 ${total} 个。</div>
        <div class="history">${payload.entries.slice(0, 6).map(entry => `<span class="pill blue">${entry.date} · ${entry.groups.reduce((a, n) => a + Number(n || 0), 0)}</span>`).join("")}</div>`, () => {
          setState(s => {
            s.pullup.startDate = payload.startDate || "2026-05-14";
            s.pullup.entries = payload.entries;
          });
          toast("已导入引体打卡表格数据");
      });
    }

    function entryTotal(entry) {
      return entry.groups.reduce((sum, n) => sum + Number(n || 0), 0);
    }

    function editPullupStart() {
      openModal("起始时间", `<label>日期<input name="date" type="date" value="${state.pullup.startDate}"></label>`, data => {
        setState(s => { s.pullup.startDate = data.date || "2026-05-14"; });
      });
    }

    function newPullupEntry(date = todayISO()) {
      const existing = state.pullup.entries.find(x => x.date === date);
      if (existing) return editPullupEntry(existing.id);
      openModal("引体打卡", `
        <label>日期<input name="date" type="date" value="${date}"></label>
        <div class="pullup-group-list" data-pullup-groups>
          ${pullupGroupField(1, 10, false)}
          <button type="button" class="icon pullup-group-add" onclick="addPullupDraftGroup(this)" title="增加一组">＋</button>
        </div>`, data => {
          const groups = Object.keys(data).filter(k => k.startsWith("g")).sort((a, b) => Number(a.slice(1)) - Number(b.slice(1))).map(k => Number(data[k] || 0)).filter(n => n > 0);
          setState(s => s.pullup.entries.push({ id: uid(), date: data.date || todayISO(), groups: groups.length ? groups : [0] }));
      });
    }

    function pullupGroupField(index, value = 10, removable = true) {
      return `<label class="pullup-group-field"><span class="pullup-group-label">第${index}组</span><input name="g${index}" type="number" min="0" step="1" value="${value}">${removable ? `<button type="button" class="pullup-group-delete" onclick="deletePullupDraftGroup(this)" title="删除本组">×</button>` : ""}</label>`;
    }

    function addPullupDraftGroup(button) {
      const list = button.closest("[data-pullup-groups]");
      const next = list.querySelectorAll("label").length + 1;
      button.insertAdjacentHTML("beforebegin", pullupGroupField(next, 10, true));
    }

    function deletePullupDraftGroup(button) {
      const list = button.closest("[data-pullup-groups]");
      button.closest("label").remove();
      renumberPullupDraftGroups(list);
    }

    function renumberPullupDraftGroups(list) {
      list.querySelectorAll("label").forEach((label, index) => {
        label.querySelector(".pullup-group-label").textContent = `第${index + 1}组`;
        label.querySelector("input").name = `g${index + 1}`;
      });
    }

    function renderPullupEntry(entry) {
      return `<div class="swipe-row pullup-record-row" data-swipe-id="${entry.id}" data-swipe-type="pullup">
      <div class="swipe-actions">
        <button onclick="editPullupEntry('${entry.id}')">编辑</button>
        <button class="danger" onclick="deletePullupEntry('${entry.id}')">删除</button>
      </div>
      <article class="item-card pullup-record-card">
        <div class="pullup-record-date">${entry.date}</div>
        <div class="pullup-record-groups">${entry.groups.length} 组</div>
        <span class="pullup-record-total">${entryTotal(entry)}</span>
      </article>
      </div>`;
    }

    function addPullupGroup(id) {
      openModal("增加一组", `<label>数量<input name="count" type="number" min="0" step="1" value="10"></label>`, data => {
        setState(s => s.pullup.entries.find(x => x.id === id).groups.push(Number(data.count || 0)));
      });
    }

    function editPullupEntry(id) {
      const entry = state.pullup.entries.find(x => x.id === id);
      const fields = entry.groups.map((g, i) => pullupGroupField(i + 1, g, true)).join("");
      openModal("编辑打卡", `
        <label>日期<input name="date" type="date" value="${entry.date}"></label>
        <div class="pullup-group-list" data-pullup-groups>
          ${fields}
          <button type="button" class="icon pullup-group-add" onclick="addPullupDraftGroup(this)" title="增加一组">＋</button>
        </div>`, data => {
          setState(s => {
            const target = s.pullup.entries.find(x => x.id === id);
            target.date = data.date || target.date;
            target.groups = Object.keys(data).filter(k => k.startsWith("g")).sort((a, b) => Number(a.slice(1)) - Number(b.slice(1))).map(k => Number(data[k] || 0)).filter(n => n > 0);
          });
      });
    }

    function deletePullupEntry(id) {
      setState(s => { s.pullup.entries = s.pullup.entries.filter(x => x.id !== id); });
    }

    function countMissed() {
      const start = new Date(state.pullup.startDate + "T00:00:00");
      const end = new Date(todayISO() + "T00:00:00");
      if (start > end) return 0;
      const hit = new Set(state.pullup.entries.map(e => e.date));
      let missed = 0;
      for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
        if (!hit.has(d.toISOString().slice(0, 10))) missed += 1;
      }
      return missed;
    }

    function renderCalendar() {
      const [selectedYear, selectedMonth] = (state.pullup.calendarMonth || todayISO().slice(0, 7)).split("-").map(Number);
      const now = new Date(selectedYear, selectedMonth - 1, 1);
      const year = now.getFullYear();
      const month = now.getMonth();
      const first = new Date(year, month, 1);
      const days = new Date(year, month + 1, 0).getDate();
      const pad = first.getDay();
      const hit = new Map(state.pullup.entries.map(e => [e.date, entryTotal(e)]));
      const start = state.pullup.startDate;
      const cells = [];
      for (let i = 0; i < pad; i++) cells.push(`<div class="pullup-day blank" aria-hidden="true"></div>`);
      for (let day = 1; day <= days; day++) {
        const iso = `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
        const total = hit.get(iso);
        const cls = total ? "hit" : (iso >= start && iso <= todayISO() ? "miss" : "");
        const today = iso === todayISO() ? " today" : "";
        cells.push(`<button class="pullup-day ${cls}${today}" onclick="newPullupEntry('${iso}')" title="${iso}${total ? `，${total}` : ""}"><span class="pullup-day-date">${day}</span><span class="pullup-day-count">${total || ""}</span></button>`);
      }
      const targetCells = Math.max(35, Math.ceil((pad + days) / 7) * 7);
      while (cells.length < targetCells) cells.push(`<div class="pullup-day blank trailing" aria-hidden="true"></div>`);
      return cells.join("");
    }

    render();
    initializeBaseData();
  </script>
</body>
</html>
